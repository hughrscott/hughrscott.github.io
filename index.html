<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hugh Scott</title>
    <meta
      name="description"
      content="Hugh Scott is a technology strategist and operator working at the intersection of AI, software, and critical infrastructure."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <main class="site-main">
        <section class="hero" aria-labelledby="name">
          <div class="hero-copy">
            <h1 id="name"></h1>
            <p class="hero-headline" id="title"></p>
            <div id="hero-body" class="prose"></div>
          </div>
          <figure class="hero-image">
            <img id="portrait" alt="" />
          </figure>
        </section>

        <section class="section" aria-labelledby="about-heading">
          <div class="section-heading">
            <h2 id="about-heading">About</h2>
          </div>
          <div id="about-body" class="prose"></div>
        </section>

        <section class="section" aria-labelledby="experience-heading">
          <div class="section-heading">
            <h2 id="experience-heading">Selected Experience</h2>
          </div>
          <div id="experience-list" class="experience-list"></div>
          <p class="section-link" id="experience-link"></p>
        </section>

        <section class="section" aria-labelledby="writing-heading">
          <div class="section-heading">
            <h2 id="writing-heading">Writing</h2>
          </div>
          <div id="writing-body" class="prose"></div>
          <div id="writing-list" class="writing-grid"></div>
        </section>

        <section class="section" aria-labelledby="interests-heading">
          <div class="section-heading">
            <h2 id="interests-heading">Current Interests</h2>
          </div>
          <ul id="interests-list" class="bullet-list"></ul>
        </section>

        <section class="section" aria-labelledby="projects-heading">
          <div class="section-heading">
            <h2 id="projects-heading">Projects / Lab</h2>
          </div>
          <div id="projects-body" class="prose"></div>
          <p class="section-link" id="projects-link"></p>
        </section>

        <section class="section" aria-labelledby="links-heading">
          <div class="section-heading">
            <h2 id="links-heading">Links</h2>
          </div>
          <ul id="links-list" class="links-list"></ul>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
